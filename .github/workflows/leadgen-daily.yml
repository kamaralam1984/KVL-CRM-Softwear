name: Daily Lead Generation

# Roz subah ~9:00 IST (3:30 UTC) auto-run. Manual bhi chala sakte ho.
on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

jobs:
  run-leadgen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Trigger lead-gen pipeline
        env:
          LEADGEN_URL: ${{ secrets.LEADGEN_URL }}
          LEADGEN_CRON_SECRET: ${{ secrets.LEADGEN_CRON_SECRET }}
        run: node crm-app/scripts/run-leadgen.mjs
